apiVersion: apps/v1
kind: Deployment
metadata:
  name: helloworld-svc
  labels:
    app: helloworld-svc
    app.kubernetes.io/name: helloworld-svc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: helloworld-svc
  template:
    metadata:
      labels:
        app: helloworld-svc
        app.kubernetes.io/name: helloworld-svc
      annotations:
        # Cles par defaut du chart grafana/k8s-monitoring (annotationAutodiscovery),
        # pas la convention classique prometheus.io/* -- verifie contre
        # charts/k8s-monitoring/charts/feature-annotation-autodiscovery/values.yaml.
        k8s.grafana.com/scrape: "true"
        k8s.grafana.com/metrics.portNumber: "8000"
        k8s.grafana.com/metrics.path: "/metrics"
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: helloworld-svc
          image: ghcr.io/k8s-gitops-lab/helloworld-svc
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
